# ジャンル設定ファイル（看護師ママ・腸活×心のデトックス）
# ペルソナ確定後に設定済み（2026-06）
# 更新: 2026-07 — 便秘・宿便感・麹・血糖値を優先／発酵食品一般は抑制
# ----------------------------------------------------------------

# ===== 商品リサーチ用キーワード =====
# ターゲット（働く女性・子育てママ）が買いそうな腸活・食事デトックス系商品
# 5〜15個推奨。1日5キーワードランダム選択でAPI呼び出し
product_keywords:
  - "便秘 サプリ"
  - "整腸 サプリ"
  - "食物繊維 サプリ"
  - "米麹"
  - "塩麹"
  - "麹 甘酒"
  - "麹水"
  - "米粉"
  - "米粉 パンケーキ"
  - "無添加 調味料"
  - "オリゴ糖"
  - "美肌 サプリ"
  - "夜勤 疲労 サプリ"

# 季節キーワード（任意・あれば季節商品を優先表示）
seasonal_keywords:
  spring:
    - "春 便秘"
    - "塩麹 レシピ"
  summer:
    - "甘酒 麹"
    - "食後 だるさ 対策"
  autumn:
    - "温活 腸活"
    - "麹 鍋"
  winter:
    - "温かい スープ 腸活"
    - "生姜 湯"

# 商品スコアリング時にボーナスを付ける「自分の世界観に合うキーワード」
genre_bonus_keywords:
  - "腸活"
  - "便秘"
  - "麹"
  - "塩麹"
  - "甘酒"
  - "血糖"
  - "無添加"
  - "整腸"
  - "食物繊維"
  - "デトックス"

# 価格帯（円）— ワーママ向け手の届きやすい価格帯
price_range:
  max: 5000

# ===== 情報リサーチ用 =====
# 参考チャンネルは後から追加可能（空でもキーワード検索は動作）
youtube_channel_ids: []

youtube_keyword_searches:
  - "便秘 スッキリしない"
  - "宿便 お腹 重い"
  - "麹 塩麹 使い方"
  - "血糖値 スパイク 食事順序"
  - "食後 眠気 だるさ"
  - "腸活 意外"

google_trends_keywords:
  - "便秘"
  - "宿便"
  - "麹"
  - "血糖値"
  - "腸活"

rss_feeds: []

# ===== 商品ジャンル軸への接続文 =====
# 商品 → 「体と心のデトックス」世界観への接続（writer/誘導文の自動生成用）
genre_connection_map:
  - keywords: ["便秘", "整腸", "食物繊維", "オリゴ糖"]
    connection: "出ない／スッキリしない／お腹が重い体感から、ゆるく整える文脈で自然に繋がる（効能断定はしない）"
  - keywords: ["麹", "塩麹", "甘酒"]
    connection: "発酵食品いっぱいより、麹のちょい足しで続けやすい——忙しいママの入口として語れる"
  - keywords: ["血糖", "低GI", "だるさ", "眠気"]
    connection: "食後のだるさ・甘いもの欲など血糖っぽい上下の体感から、食べる順番やおやつの話につなげる"
  - keywords: ["無添加", "調味料", "食材"]
    connection: "添加物を減らす食事デトックスの第一歩として、無添加・調味料はそのまま語れる"
  - keywords: ["美肌", "デトックス", "腸活"]
    connection: "腸と肌の変化の実体験とつなげて、内側からのケアとして紹介できる"
  - keywords: ["疲労", "夜勤", "サプリ"]
    connection: "夜勤ありのワーママ看護師として、不規則生活でも体を整える視点から共感を生める"
