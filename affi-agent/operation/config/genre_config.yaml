genre_connection_map:
  - keywords: ["腸活", "プロバイオティクス", "乳酸菌", "整腸", "発酵"]
    connection: "看護師20年の私が腸活で−10kgした体験から、まずは腸から整える発信をしている文脈で自然に繋がる"
