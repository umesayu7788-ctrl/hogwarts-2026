name: Daily Threads Operation Cycle

on:
  schedule:
    - cron: '37 20 * * *'   # 05:37 JST
    - cron: '26 21 * * *'   # 06:26 JST（予備）
    - cron: '51 22 * * *'   # 07:51 JST（予備2）
  workflow_dispatch:
    inputs:
      theme:
        description: '今日のテーマ（空白の場合はAIが自動選定）'
        required: false
        default: ''

permissions:
  issues: write
  contents: read

jobs:
  run-daily-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🔐 在籍認証＋保護KB取得（U2・二重判定）
        env:
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: |
          set -e
          echo "$DISCORD_USER_ID" > auth_member.txt
          if [ -n "$DISCORD_USER_ID" ] && node lm-fetch.js --check ; then
            echo "U2: Discord在籍を確認。保護KBをKVから更新（取得失敗時はローカル温存）"
            while IFS= read -r d; do
              [ -z "$d" ] && continue
              case "$d" in \#*) continue;; esac
              if node lm-fetch.js "$d" > "operation/knowledge/$d.tmp" 2>/dev/null && [ -s "operation/knowledge/$d.tmp" ]; then
                mv "operation/knowledge/$d.tmp" "operation/knowledge/$d"
              else
                rm -f "operation/knowledge/$d.tmp"
              fi
            done < affili_kb_list.txt
          else
            echo "U2未確認 → 旧月次トークンで判定（移行期の二重判定）"
            python scripts/utils/auth_check.py
          fi

      - name: Check if today already started
        id: skip_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          JST_HOUR=$(TZ=Asia/Tokyo date +%H)

          # JST 12:00以降はスキップ（日中の誤起動防止）。朝の遅延実行は許容
          # workflow_dispatchの場合は時刻制限を無視
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$JST_HOUR" -ge 12 ]; then
            echo "should_run=SKIP" >> "$GITHUB_OUTPUT"
            echo "Current JST hour ($JST_HOUR) is >= 12. Skipping delayed cron execution."
            exit 0
          fi

          # Issue存在ではなく「ライター生成済みか（=承認申請コメントあり）」で判定
          ISSUE_NUM=$(gh api "repos/${{ github.repository }}/issues?labels=daily-operation&state=all&per_page=5" --jq ".[] | select(.title | contains(\"$TODAY\")) | .number" 2>/dev/null | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            echo "should_run=RUN" >> "$GITHUB_OUTPUT"
            echo "No issue for $TODAY - running."
            exit 0
          fi
          HAS_REVIEW=$(gh api "repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" --jq ".[] | select(.body | contains(\"校閲より：承認申請\")) | .id" 2>/dev/null | head -1)
          if [ -n "$HAS_REVIEW" ]; then
            echo "should_run=SKIP" >> "$GITHUB_OUTPUT"
            echo "Issue #$ISSUE_NUM already has review approval - skipping."
          else
            echo "should_run=RUN" >> "$GITHUB_OUTPUT"
            echo "Issue #$ISSUE_NUM exists but no review yet - running."
          fi

      - name: Step 1-2 - InfoResearcher Research
        if: steps.skip_check.outputs.should_run != 'SKIP'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: cd scripts && python info_research.py --theme "${{ github.event.inputs.theme }}"

      - name: Step 3-4 - Writer & Reviewer (auto-retry)
        if: steps.skip_check.outputs.should_run != 'SKIP'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd scripts
          MAX_RETRY=2
          attempt=0
          while [ $attempt -le $MAX_RETRY ]; do
            echo "=== Writer write attempt $((attempt+1))/$((MAX_RETRY+1)) ==="
            python writer.py
            echo "=== Reviewer review attempt $((attempt+1))/$((MAX_RETRY+1)) ==="
            set +e
            python content_review.py
            exit_code=$?
            set -e
            if [ $exit_code -eq 0 ]; then
              echo "Approved"
              break
            elif [ $exit_code -eq 10 ]; then
              attempt=$((attempt+1))
              if [ $attempt -gt $MAX_RETRY ]; then
                echo "Max retries reached"
                python -c "import os; from utils.github_issues import GitHubIssues; gh=GitHubIssues(os.getenv('GITHUB_TOKEN'),os.getenv('GITHUB_REPO')); issue=gh.get_or_create_today_issue(); gh.update_pipeline_status(issue.number,'reviewer','rejected_final'); gh.add_comment(issue.number,'## Warning: auto-retry limit\n\nManual fix needed. Comment with fix: instructions.')"
                exit 0
              fi
              echo "Rejected - retry in 30s"
              sleep 30
            else
              echo "Unexpected error: $exit_code"
              exit $exit_code
            fi
          done
