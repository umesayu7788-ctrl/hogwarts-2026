name: Monitor Daily (Quality + Health Watch)

on:
  # 毎日の運用中に30分ごとに監視（7:00〜12:00 JST = 22:00〜03:00 UTC）
  schedule:
    - cron: '13,43 22,23 * * *'   # 7:13/7:43/8:13/8:43 JST（混雑回避）
    - cron: '13,43 0,1,2,3 * * *' # 9:13/9:43〜12:43 JST（混雑回避）

  # 手動実行も可能（任意のタイミングで）
  workflow_dispatch:
    inputs:
      mode:
        description: '監視モード: health / quality / full'
        required: false
        default: 'full'

permissions:
  issues: write
  contents: read

jobs:
  monitor-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Run Monitor Daily
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:         ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/monitor_daily.py --mode ${{ github.event.inputs.mode || 'full' }}
