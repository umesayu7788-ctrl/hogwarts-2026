name: Auto-Measure All Posts (Daily)

# 毎日22:00 JST に前日の全投稿を自動計測する
on:
  schedule:
    - cron: '17 13 * * *'   # 22:17 JST（メイン）
    - cron: '47 13 * * *'   # 22:47 JST（予備1）
    - cron: '17 14 * * *'   # 23:17 JST（予備2）
  workflow_dispatch:
    inputs:
      target_date:
        description: '計測対象日（YYYY-MM-DD、空白=昨日）'
        required: false
        default: ''

permissions:
  issues: write
  contents: write          # buzz_posts.md更新のため

jobs:
  auto-measure:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🔐 在籍認証＋保護KB取得（U2・二重判定）
        env:
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: |
          set -e
          echo "$DISCORD_USER_ID" > auth_member.txt
          if [ -n "$DISCORD_USER_ID" ] && node lm-fetch.js --check ; then
            echo "U2: Discord在籍を確認。保護KBをKVから更新（取得失敗時はローカル温存）"
            while IFS= read -r d; do
              [ -z "$d" ] && continue
              case "$d" in \#*) continue;; esac
              if node lm-fetch.js "$d" > "operation/knowledge/$d.tmp" 2>/dev/null && [ -s "operation/knowledge/$d.tmp" ]; then
                mv "operation/knowledge/$d.tmp" "operation/knowledge/$d"
              else
                rm -f "operation/knowledge/$d.tmp"
              fi
            done < affili_kb_list.txt
          else
            echo "U2未確認 → 旧月次トークンで判定（移行期の二重判定）"
            python scripts/utils/auth_check.py
          fi

      - name: Measure all yesterday's posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then
            mkdir -p credentials
            echo "$GOOGLE_CREDENTIALS_JSON" > credentials/sheets_service_account.json
            export GOOGLE_CREDENTIALS_PATH=credentials/sheets_service_account.json
          fi
          cd scripts
          python auto_measure.py --target-date "${{ github.event.inputs.target_date }}"

      - name: Commit updated files (buzz_posts.md + note_drafts)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # buzz_posts.md の変更をステージ
          git add operation/knowledge/buzz_posts.md 2>/dev/null || true

          # note_drafts/ の新規骨子ファイルをステージ
          git add operation/note_drafts/*.md 2>/dev/null || true

          # 変更があればコミット
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: バズ投稿ナレッジ・note骨子を追記"
            git push
          fi
