name: GAS Watchdog - Daily Cycle Monitor

on:
  schedule:
    - cron: '30 21 * * *'  # 06:30 JST（GAS 05:00 発火後の確認）
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  actions: write

env:
  DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check today's cycle status
        id: check_status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Checking daily cycle status for $TODAY..."

          ISSUE_NUMBER=$(gh api "repos/${{ github.repository }}/issues?labels=daily-operation&state=all&per_page=5" \
            --jq ".[] | select(.title | contains(\"$TODAY\")) | .number" 2>/dev/null | head -1 || echo "")

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "status=no_issue" >> "$GITHUB_OUTPUT"
            echo "No issue found for today"
          else
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            HERMIONE_COMMENT=$(gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
              --jq '.[] | select(.body | contains("ハーマイオニーより")) | .body' 2>/dev/null | head -1 || echo "")

            if [ -n "$HERMIONE_COMMENT" ]; then
              echo "status=ok" >> "$GITHUB_OUTPUT"
              echo "Hermione already done - all good"
            else
              echo "status=hermione_not_done" >> "$GITHUB_OUTPUT"
              echo "Hermione not done yet - triggering recovery"
            fi
          fi

      - name: All good - exit early
        if: steps.check_status.outputs.status == 'ok'
        run: echo "All good - Hermione completed today's cycle"

      - name: Auto-recover - trigger daily-cycle
        if: steps.check_status.outputs.status != 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering daily-cycle recovery..."
          gh api "repos/${{ github.repository }}/actions/workflows/daily-cycle.yml/dispatches" \
            -X POST \
            -f ref=master \
            -f inputs='{}' || echo "Failed to trigger daily-cycle"

      - name: Notify Discord - watchdog alert
        if: steps.check_status.outputs.status != 'ok'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          pip install -q requests python-dotenv 2>/dev/null || true
          STATUS="${{ steps.check_status.outputs.status }}"
          REPO="${{ github.repository }}"

          python3 - <<'PYEOF'
import os, requests, datetime

status = os.environ.get("STATUS", "unknown")
repo = os.environ.get("REPO", "")
webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")

now_str = datetime.datetime.now().strftime("%H:%M JST")
cause = "GAS未発火の可能性" if status == "no_issue" else "GASは発火したがハーマイオニー段階まで進んでいない"

message = f"""🔴 **GAS Watchdog 警報** （{now_str} 検知）
━━━━━━━━━━━━━━━━━━━━━
## 🚦 今あなたがすること: ⏳ **待つだけ**（追加対応不要）
━━━━━━━━━━━━━━━━━━━━━

⏰ 次の通知: 5〜10分後に通常の承認依頼通知が届きます
✅ 8:15 JST 承認デッドライン: 余裕で間に合います

📊 状況サマリ:
  ・推定原因: {cause}
  ・自動復旧: daily-cycle.yml を起動済み

━━━━━━━━━━━━━━━━━━━━━
## 📋 後で確認する場合
━━━━━━━━━━━━━━━━━━━━━
トラブルシュート手順書: operation/WATCHDOG_TROUBLESHOOTING.md を参照"""

if webhook:
    try:
        requests.post(webhook, json={"content": message}, timeout=10)
        print("Discord通知送信完了")
    except Exception as e:
        print(f"Discord通知失敗: {e}")
PYEOF
        env:
          STATUS: ${{ steps.check_status.outputs.status }}
          REPO: ${{ github.repository }}
