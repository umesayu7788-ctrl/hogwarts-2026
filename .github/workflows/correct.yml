name: Correct Posts (Phone Trigger)

# GitHub Issueに「修正: 〇〇」とコメントすると自動で再生成される
on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

env:
  DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}

jobs:
  correct:
    # daily-operationラベルのIssueへのコメントで、「修正:」で始まる場合のみ実行
    if: |
      contains(github.event.issue.labels.*.name, 'daily-operation') &&
      startsWith(github.event.comment.body, '修正:') &&
      github.event.comment.user.type != 'Bot' &&
      (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt


      - name: Re-run Luna (with correction)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/luna_write.py

      - name: Re-run Malfoy review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/malfoy_review.py
